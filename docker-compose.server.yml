version: '3.8'

services:
  abaper-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8013:8013"
    environment:
      - PORT=8013
    volumes:
      - ./logs:/var/log/abaper
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8013/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Optional: Add nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - abaper-server
    restart: unless-stopped
